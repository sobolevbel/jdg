site_name: "JDG — ИП в Польше"
site_description: "Гайд по регистрации и ведению JDG (ИП) в Польше"
site_author: "sobolevbel"
site_url: https://sobolevbel.github.io/jdg/
repo_url: https://github.com/sobolevbel/jdg
repo_name: sobolevbel/jdg

nav:
  - Главная: index.md
  - PESEL: pesel.md
  - Profil Zaufany: pz.md
  - Регистрация:    # section
    - Регистрация JDG: registration_jdg.md
    - Регистрация VAT: registration_vat.md
    - Регистрация VAT-UE: registration_vat_ue.md
    - Изменение данных и закрытие JDG: jdg_changes.md
  - ZUS:    # section
    - ZUS: zus.md
    - Переход на следующий режим: zus_next_level.md
    - Льгота Ulga na Start: zus_ulga_na_start.md
    - Переход на Składki Preferencyjne: zus_obnizone_skladki.md
    - Переход на Duży ZUS: zus_duzy.md
    - Ошибки ZUS: zus_errors.md
    - ZUS-Каникулы: zus_vacation.md
    - Контакты: zus_contact.md
  - Налоги: taxes.md
  - Декларации: # section
    - Общая информация: declarations.md
    - Отчёты ZUS: declarations_zus.md
    - Декларации VAT: declarations_vat.md
    - JPK_V7M через e-mikrofirma: declarations_jpk_emikrofirma.md
    - Декларация PIT: declarations_pit.md
  - Легализация:
    - Легализация: legalization.md
    - Подача через MOS: legalization_mos2.md
  - Рабочий процесс: workflow.md
  - Как отправить письмо в налоговую: pismo_ogolne.md
  - inFakt:    # section
    - Настройка: infakt_settings.md
    - Ежемесячные операции: infakt_routine.md
    - Миграция на inFakt: infakt_migration.md
  - wFirma:    # section
    - Настройка: wfirma_settings.md
    - Ежемесячные операции: wfirma_routine.md
    - Миграция на wFirma: wfirma_migration.md
  - Словарь: glossary.md
  - F.A.Q.: faq.md
  - Что нового: whatsnew.md
  - ♥&nbsp;Поддержать: support.md

theme:
  name: material
  custom_dir: overrides
  accent: indigo
  features:
    - navigation.top
    - navigation.expand
    - navigation.footer
    - navigation.indexes
    - navigation.path
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - toc.follow
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
  edit_uri: edit/master/docs/
  palette:
    # Palette toggle for light mode
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - i18n:
      reconfigure_material: true
      docs_structure: suffix
      languages:
        - locale: ru
          default: true
          name: Русский
          build: true
        - locale: en
          name: English
          build: true
          site_name: "JDG — Sole Proprietorship in Poland"
          site_description: "Guide to registering and running a JDG (sole proprietorship) in Poland"
          nav_translations:
            Главная: Home
            Регистрация: Registration
            Регистрация JDG: JDG Registration
            Регистрация VAT: VAT Registration
            Регистрация VAT-UE: VAT-UE Registration
            Изменение данных и закрытие JDG: Updating Data and Closing a JDG
            Переход на следующий режим: Switching to Next Tier
            Льгота Ulga na Start: Ulga na Start Benefit
            Переход на Składki Preferencyjne: Switching to Składki Preferencyjne
            Переход на Duży ZUS: Switching to Duży ZUS
            Ошибки ZUS: ZUS Errors
            ZUS-Каникулы: ZUS Vacation
            Контакты: Contacts
            Налоги: Taxes
            Декларации: Declarations
            Общая информация: Overview
            Отчёты ZUS: ZUS Reports
            Декларации VAT: VAT Declarations
            JPK_V7M через e-mikrofirmę: JPK_V7M via e-mikrofirma
            Декларация PIT: PIT Declaration
            Легализация: Legalization
            Подача через MOS: Applying via MOS
            Рабочий процесс: Workflow
            Как отправить письмо в налоговую: Letter to Tax Office
            Настройка: Setup
            Ежемесячные операции: Monthly Operations
            Миграция на inFakt: Migration to inFakt
            Миграция на wFirma: Migration to wFirma
            Словарь: Glossary
            F.A.Q.: F.A.Q.
            Что нового: What's New
            ♥&nbsp;Поддержать: ♥&nbsp;Support
  - search:
      lang:
      - ru
      - en
  - git-revision-date-localized
  - social:
      enabled: !ENV [ENABLE_SOCIAL, false]
  - privacy:
      assets_exclude:
        - cct.google/*
        - www.googletagmanager.com/*
        - www.google-analytics.com/*
        - fonts.googleapis.com/*
        - fonts.gstatic.com/*
        - pomoc.wfirma.pl/*
  - optimize:
      enabled: !ENV [ENABLE_OPTIMIZE, false]
      optimize_png: false
  - meta
  - tags
  - glightbox
  - open-in-new-tab
  - redirects:
      redirect_maps:
        'registration.md': 'registration_jdg.md'
        'legalization_warsaw.md': 'legalization_mos2.md'
        'registration.en.md': 'registration_jdg.en.md'
        'legalization_warsaw.en.md': 'legalization_mos2.en.md'
  - minify:
      minify_html: true

markdown_extensions:
  - attr_list     # for Buttons
  - admonition    # for Admonitions, also known as call-outs,
  - pymdownx.details    # for Admonitions, also known as call-outs,
  - pymdownx.superfences    # for Admonitions, also known as call-outs,
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      options:
        custom_icons:
          - overrides/.icons
  - toc:
      slugify: !!python/name:slugify.slugify
      permalink: ¶
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true
extra:
  homepage: https://sobolevbel.github.io/jdg/

  consent:
    title: Cookie consent
    description: >-
      We use cookies to recognize your repeated visits and preferences, as well
      as to measure the effectiveness of our documentation and whether users
      find what they're searching for. With your consent, you're helping us to
      make our documentation better.
    actions:
      - accept
      - manage

copyright: <a href="#__consent">Change cookie settings</a>

extra_css:
  - css/extra.css

extra_javascript:
  - https://www.googletagmanager.com/gtag/js?id=G-65Z83YVGT1
  - javascript/extra.js
